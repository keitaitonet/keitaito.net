name: Deploy (production)

on:
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  check:
    name: Check
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    uses: ./.github/workflows/_check.yml

  deploy:
    name: Deploy
    needs: check
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter blog build
        env:
          SITE_URL: ${{ vars.SITE_URL }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Sync to S3
        run: aws s3 sync apps/blog/dist/ s3://${{ vars.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths '/*'
